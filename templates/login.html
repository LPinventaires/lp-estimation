<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#18150f">
<title>Leonard Properties — Connexion</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      {% if logo %}<img src="{{ url_for('static', filename='uploads/' + logo) }}" alt="LP">{% else %}LP{% endif %}
    </div>
    <div class="login-brand">LEONARD&nbsp;PROPERTIES</div>
    <div class="login-tag">Estimation hédoniste</div>
    {% with msgs = get_flashed_messages() %}
      {% if msgs %}<div class="flash" style="margin:0 0 14px">{{ msgs|join(' ') }}</div>{% endif %}
    {% endwith %}
    <form method="post">
      <div class="field">
        <input type="password" name="password" autofocus placeholder="Code d'accès">
      </div>
      <button class="btn block" type="submit">Accéder</button>
    </form>
    <div class="login-foot">Accès réservé</div>
  </div>
</body>
</html>

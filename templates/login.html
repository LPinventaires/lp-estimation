<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#2a2520">
<title>Leonard Properties — Connexion</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
  .login-card{width:340px}
  .login-card .field input{text-align:left;letter-spacing:normal}
  .login-logo{width:120px;height:120px;background:#2a2520;border-radius:12px;padding:14px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line)}
  .login-logo img{max-width:100%;max-height:100%;object-fit:contain;border-radius:0}
  .login-logo-fallback{color:var(--accent);font-weight:700;letter-spacing:.2em;font-size:22px}
</style>
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      {% if logo %}
        <img src="{{ url_for('static', filename='uploads/' + logo) }}" alt="Leonard Properties">
      {% else %}
        <span class="login-logo-fallback">LP</span>
      {% endif %}
    </div>
    <div class="login-brand">LEONARD&nbsp;PROPERTIES</div>
    <div class="login-tag">Estimation hédoniste</div>
    {% with msgs = get_flashed_messages() %}
      {% if msgs %}<div class="flash" style="margin:0 0 14px">{{ msgs|join(' ') }}</div>{% endif %}
    {% endwith %}
    <form method="post">
      <div class="field">
        <input type="password" name="password" autofocus required placeholder="Mot de passe">
      </div>
      <button class="btn block" type="submit">Se connecter</button>
    </form>
    <div class="login-foot">Accès réservé</div>
  </div>
</body>
</html>

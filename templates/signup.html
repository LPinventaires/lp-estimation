<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#2a2520">
<title>Leonard Properties — Inscription</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
  .login-card{width:340px}
  .login-card .field input{text-align:left;letter-spacing:normal}
  .login-alt{margin-top:16px;font-size:13px;color:#6a604f}
  .login-alt a{color:var(--accent2);font-weight:600}
</style>
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      {% if logo %}<img src="{{ url_for('static', filename='uploads/' + logo) }}" alt="LP">{% else %}LP{% endif %}
    </div>
    <div class="login-brand">LEONARD&nbsp;PROPERTIES</div>
    <div class="login-tag">Créer un compte</div>
    {% with msgs = get_flashed_messages() %}
      {% if msgs %}<div class="flash" style="margin:0 0 14px">{{ msgs|join(' ') }}</div>{% endif %}
    {% endwith %}
    <form method="post">
      <div class="field">
        <input type="text" name="name" placeholder="Nom (optionnel)">
      </div>
      <div class="field">
        <input type="email" name="email" required placeholder="Email">
      </div>
      <div class="field">
        <input type="password" name="password" required placeholder="Mot de passe (8 caractères min.)">
      </div>
      <div class="field">
        <input type="password" name="confirm" required placeholder="Confirmer le mot de passe">
      </div>
      <button class="btn block" type="submit">Créer mon compte</button>
    </form>
    <div class="login-alt">
      Déjà un compte ? <a href="{{ url_for('login') }}">Se connecter</a>
    </div>
    <div class="login-foot"><a href="{{ url_for('index') }}" style="color:inherit">← Accueil</a></div>
  </div>
</body>
</html>

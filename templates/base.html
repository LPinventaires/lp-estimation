<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}LP · Estimation hédoniste{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header class="topbar no-print">
  <a class="brand" href="{{ url_for('index') }}">
    {% set logo = get_logo_path() %}
    {% if logo %}
      <img src="{{ url_for('static', filename='uploads/' + logo) }}" alt="LP" style="height:24px;width:auto;margin-right:8px;vertical-align:middle">
    {% endif %}
    LEONARD&nbsp;PROPERTIES
  </a>
  <nav>
    <a href="{{ url_for('index') }}">Estimations</a>
    <a href="{{ url_for('references') }}">Références prix/m²</a>
    <a href="{{ url_for('settings') }}">Paramètres</a>
    <a href="{{ url_for('logout') }}" class="ghost">Quitter</a>
  </nav>
</header>
{% with msgs = get_flashed_messages() %}
  {% if msgs %}<div class="flash no-print">{{ msgs|join(' ') }}</div>{% endif %}
{% endwith %}
<main>{% block content %}{% endblock %}</main>
{% block scripts %}{% endblock %}
</body>
</html>

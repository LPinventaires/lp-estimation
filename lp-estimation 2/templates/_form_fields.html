<div class="card">
  <div class="section-title">Le bien</div>
  <div class="grid">
    <div class="field"><label>Adresse</label><input name="address" placeholder="Ex. Rue Abraham-Gevray 1"></div>
    <div class="field"><label>Quartier</label>
      <select name="quartier"><option value="">—</option>
        {% for q in quartiers %}<option value="{{ q }}">{{ q }}</option>{% endfor %}</select></div>
    <div class="field"><label>Type</label>
      <select name="type_bien"><option>Appartement</option><option>Duplex</option>
      <option>Attique</option><option>Triplex</option></select></div>
    <div class="field"><label>Surface pondérée (m²)</label><input name="surface" inputmode="decimal" placeholder="180"></div>
    <div class="field"><label>Pièces</label><input name="pieces" placeholder="5"></div>
    <div class="field"><label>Étage</label><input name="etage" placeholder="3"></div>
    <div class="field"><label>Année de construction</label><input name="annee" placeholder="~2016"></div>
    <div class="field"><label>État</label><input name="etat" placeholder="Excellent / rénové"></div>
  </div>
</div>

<div class="card">
  <div class="section-title">Prix au m² &amp; compléments</div>
  <div class="grid">
    <div class="field"><label>Prix/m² retenu (CHF)</label><input name="prix_m2" inputmode="decimal" placeholder="20000">
      <span class="hint">Proposé d'après les comparables de la localité — ajuste selon les qualités du bien.</span></div>
    <div class="field"><label>Marge négo + commission</label>
      <select name="marge"><option value="0.07">7 %</option><option value="0.05">5 %</option>
      <option value="0.10">10 %</option><option value="0.075">7.5 %</option></select></div>
    <div class="field"><label>Balcon / loggia / terrasse (m²)</label><input name="balcon" inputmode="decimal" placeholder="0"></div>
    <div class="field"><label>Pondération extérieurs</label>
      <select name="balcon_pond"><option value="0.5">50 %</option><option value="0.3">30 %</option>
      <option value="1">100 %</option></select></div>
    <div class="field"><label>Places de parking (nb)</label><input name="parking_nb" inputmode="numeric" placeholder="0"></div>
    <div class="field"><label>Valeur par place (CHF)</label><input name="parking_val" inputmode="decimal" placeholder="160000"></div>
  </div>
</div>

<div class="card">
  <div class="section-title">Descriptif (optionnel)</div>
  <div class="field"><label>Situation &amp; description</label><textarea name="description" rows="3" placeholder="Situation, prestations, distribution…"></textarea></div>
  <div class="grid">
    <div class="field"><label>Atouts (un par ligne)</label><textarea name="atouts" rows="3"></textarea></div>
    <div class="field"><label>Points d'attention (un par ligne)</label><textarea name="inconvenients" rows="3"></textarea></div>
  </div>
  <div class="field"><label>Courtier</label><input name="courtier" placeholder="Nom · LEONARD PROPERTIES SA"></div>
</div>
